<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhyan AI // Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="chat-container">
        <!-- HEADER -->
        <header class="chat-header">
            <!-- Left brand details removed entirely -->
            <div class="brand-placeholder"></div>
            <!-- Auth Link -->
            <div class="header-auth">
                <button class="btn-signin" id="btn-signin">Sign In</button>
            </div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <main class="chat-main" id="chat-main">
            <!-- LANDING STATE (Gemini Style - Centered Logo and Callout) -->
            <div class="landing-state" id="landing-state">
                <div class="landing-content">
                    <img src="logo.png" alt="Dhyani Tracks Logo" class="landing-logo">
                    <div class="highlight-line">you say, you get : dhyan AI</div>
                    
                    <!-- Chat form placed directly below the title in landing state -->
                    <div id="form-mount" class="form-mount">
                        <form id="chat-form" class="chat-form">
                            <div class="input-wrapper">
                                <input type="text" id="user-input" placeholder="Ask us" autocomplete="off" required>
                                <button type="submit" class="btn-send-icon" aria-label="Send message">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 4L12 20M12 4L6 10M12 4L18 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- CHAT MESSAGES AREA (Hidden initially, shown once conversation starts) -->
            <div class="chat-messages" id="chat-messages" style="display: none;">
                <!-- Message bubbles will be appended dynamically here -->
            </div>
        </main>

        <!-- INPUT FOOTER (Hidden initially, receives chat form when conversation starts) -->
        <footer class="chat-footer" id="chat-footer" style="display: none;">
            <!-- Form moves here in JS -->
        </footer>
    </div>
</body>
</html>
